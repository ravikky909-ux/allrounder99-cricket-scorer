name: Build Allrounder99 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare web app files
        run: |
          mkdir -p www
          cp index.html www/index.html

          cat > package.json <<'EOF'
          {
            "name": "allrounder99-cricket-scorer",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^7.0.0",
              "@capacitor/cli": "^7.0.0",
              "@capacitor/android": "^7.0.0"
            }
          }
          EOF

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.allrounder99.cricketscorer",
            "appName": "Allrounder99 Cricket Scorer",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Install dependencies
        run: npm install

      - name: Create Android project
        run: npx cap add android

      - name: Add A99 app icon
        run: |
          cat > android/app/src/main/res/drawable/a99_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#003B46" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#00D5E8" android:pathData="M75,26a30,30 0,1 1,-42 8a25,25 0,1 0,37 31l-6,-6h26v26l-7,-7a36,36 0,1 1,-8,-52z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M20,78 L48,24 H65 L58,55 H77 L35,88 L48,62 H32z"/>
              <path android:fillColor="#00D5E8" android:pathData="M67,43h12c5,0 8,3 8,8v14c0,5 -3,8 -8,8H67c-5,0 -8,-3 -8,-8V51c0,-5 3,-8 8,-8z M70,54v8h7v-8z"/>
              <path android:fillColor="#00D5E8" android:pathData="M88,43h12c5,0 8,3 8,8v14c0,5 -3,8 -8,8H88c-5,0 -8,-3 -8,-8V51c0,-5 3,-8 8,-8z M91,54v8h7v-8z"/>
          </vector>
          EOF

          cp android/app/src/main/res/drawable/a99_launcher.xml android/app/src/main/res/drawable/a99_launcher_round.xml

          sed -i 's/@mipmap\/ic_launcher/@drawable\/a99_launcher/g' android/app/src/main/AndroidManifest.xml
          sed -i 's/@mipmap\/ic_launcher_round/@drawable\/a99_launcher_round/g' android/app/src/main/AndroidManifest.xml

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Allrounder99-Cricket-Scorer.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Allrounder99-Cricket-Scorer-APK
          path: output/Allrounder99-Cricket-Scorer.apk
